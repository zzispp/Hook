name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag, for example v0.1.0'
        required: true
        type: string

concurrency:
  group: release-${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
  cancel-in-progress: false

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  NODE_OPTIONS: --max-old-space-size=4096

jobs:
  preflight:
    name: Preflight
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.release.outputs.tag }}
      prerelease: ${{ steps.release.outputs.prerelease }}
    steps:
      - name: Classify release tag
        id: release
        shell: bash
        env:
          INPUT_TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail

          tag="${GITHUB_REF_NAME}"
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            tag="${INPUT_TAG}"
          fi

          if [[ ! "${tag}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-(beta|rc)\.[0-9]+)?$ ]]; then
            echo "Release tags must match vX.Y.Z, vX.Y.Z-beta.N, or vX.Y.Z-rc.N." >&2
            exit 1
          fi

          prerelease="false"
          if [[ "${tag}" =~ -(beta|rc)\. ]]; then
            prerelease="true"
          fi

          echo "tag=${tag}" >> "${GITHUB_OUTPUT}"
          echo "prerelease=${prerelease}" >> "${GITHUB_OUTPUT}"

  frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    needs: preflight
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.preflight.outputs.tag }}
          fetch-depth: 1

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.33.4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build embedded frontend
        run: pnpm build:frontend:embedded

      - name: Upload embedded frontend
        uses: actions/upload-artifact@v7
        with:
          name: hook-frontend-out
          path: apps/hook_frontend/out
          if-no-files-found: error
          retention-days: 1

  packages:
    name: Package ${{ matrix.platform }}
    needs:
      - preflight
      - frontend
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux-amd64
            runner: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
          - platform: linux-arm64
            runner: ubuntu-22.04-arm
            target: aarch64-unknown-linux-gnu
          - platform: macos-amd64
            runner: macos-15-intel
            target: x86_64-apple-darwin
          - platform: macos-arm64
            runner: macos-15
            target: aarch64-apple-darwin
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.preflight.outputs.tag }}
          fetch-depth: 1

      - name: Download embedded frontend
        uses: actions/download-artifact@v8
        with:
          name: hook-frontend-out
          path: apps/hook_frontend/out

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.target }}

      - name: Build release binaries
        run: |
          cargo build --release -p hook_backend --target "${{ matrix.target }}"
          cargo build --release -p user --bin generate_password_hash --target "${{ matrix.target }}"

      - name: Package release asset
        env:
          HOOK_RELEASE_VERSION: ${{ needs.preflight.outputs.tag }}
          HOOK_RELEASE_PLATFORM: ${{ matrix.platform }}
          HOOK_RELEASE_TARGET: ${{ matrix.target }}
        run: scripts/package-release.sh

      - name: Upload release package
        uses: actions/upload-artifact@v7
        with:
          name: hook-release-${{ matrix.platform }}
          path: dist/*.tar.gz
          if-no-files-found: error
          retention-days: 1

  publish:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs:
      - preflight
      - packages
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.preflight.outputs.tag }}
          fetch-depth: 1

      - name: Download release packages
        uses: actions/download-artifact@v8
        with:
          pattern: hook-release-*
          path: dist
          merge-multiple: true

      - name: Prepare checksums
        shell: bash
        run: |
          set -euo pipefail
          cp install.sh dist/install.sh
          chmod +x dist/install.sh
          cd dist
          sha256sum hook-*.tar.gz install.sh > SHA256SUMS

      - name: Publish release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.preflight.outputs.tag }}
          PRERELEASE: ${{ needs.preflight.outputs.prerelease }}
        run: |
          set -euo pipefail

          args=(--title "${RELEASE_TAG}" --generate-notes)
          if [[ "${PRERELEASE}" == "true" ]]; then
            args+=(--prerelease)
          fi

          if gh release view "${RELEASE_TAG}" >/dev/null 2>&1; then
            gh release upload "${RELEASE_TAG}" dist/* --clobber
            exit 0
          fi

          gh release create "${RELEASE_TAG}" dist/* "${args[@]}"
