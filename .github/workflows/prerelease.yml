name: Prerelease Tag

on:
  workflow_dispatch:
    inputs:
      base_version:
        description: 'Base version without v, for example 1.0.1'
        required: true
        type: string
      channel:
        description: 'Prerelease channel'
        required: true
        type: choice
        options:
          - beta
          - rc

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: prerelease-${{ inputs.base_version }}-${{ inputs.channel }}
  cancel-in-progress: false

jobs:
  tag:
    name: Create Prerelease Tag
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}

      - name: Create next prerelease tag
        shell: bash
        env:
          BASE_VERSION: ${{ inputs.base_version }}
          CHANNEL: ${{ inputs.channel }}
        run: |
          set -euo pipefail

          if [[ ! "${BASE_VERSION}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "base_version must match X.Y.Z." >&2
            exit 1
          fi

          git fetch --tags --force

          prefix="v${BASE_VERSION}-${CHANNEL}."
          escaped_prefix="${prefix//./\\.}"
          latest="$(
            git tag --list "${prefix}*" \
              | sed -nE "s/^${escaped_prefix}([0-9]+)$/\\1/p" \
              | sort -n \
              | tail -n 1
          )"

          next=1
          if [[ -n "${latest}" ]]; then
            next=$((latest + 1))
          fi

          tag="${prefix}${next}"
          if git rev-parse -q --verify "refs/tags/${tag}" >/dev/null; then
            echo "Tag already exists: ${tag}" >&2
            exit 1
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "${tag}" -m "Prerelease ${tag}"
          git push origin "${tag}"

          echo "Created ${tag}"
