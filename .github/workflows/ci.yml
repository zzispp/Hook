name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
  merge_group:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  NODE_OPTIONS: --max-old-space-size=4096

jobs:
  rust:
    name: Rust
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Install just
        uses: extractions/setup-just@v4

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all --check

      - name: Check backend
        run: cargo check -p hook_backend

      - name: Lint workspace
        run: just lint

      - name: Compile tests
        run: cargo test --workspace --all-targets --no-run

      - name: Test backend crate
        run: timeout 60s cargo test -p hook_backend --all-targets

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.33.4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint frontend
        run: pnpm lint:frontend

      - name: Build embedded frontend
        run: pnpm build:frontend:embedded

  migration:
    name: Migration
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: hook_ci
          POSTGRES_USER: hook
          POSTGRES_PASSWORD: hook_ci_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U hook -d hook_ci"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: migration

      - name: Install PostgreSQL client
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends postgresql-client

      - name: Verify migration up preserves existing data
        run: timeout 600s bash scripts/ci-migration-preservation.sh

  docker:
    name: Docker
    runs-on: ubuntu-latest
    needs:
      - rust
      - frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Check deployment scripts
        run: |
          for script in deploy.sh update.sh install.sh scripts/*.sh; do
            bash -n "$script"
          done

      - name: Validate workflows
        run: ruby -e 'require "yaml"; Dir[".github/workflows/*.yml"].each { |file| YAML.load_file(file) }'

      - name: Validate Docker Compose config
        run: |
          cat > .env.ci <<'EOF'
          HOOK_PORT=15555
          HOOK_IMAGE_TAG=ci
          POSTGRES_DB=hook
          POSTGRES_USER=hook
          POSTGRES_PASSWORD=ci-postgres-password
          HOOK_LOG_LEVEL=info
          HOOK_ADMIN_USERNAME=admin
          HOOK_ADMIN_EMAIL=admin@example.com
          HOOK_ADMIN_PASSWORD_B64=YWRtaW4tcGFzc3dvcmQtMTIz
          HOOK_JWT_SECRET=ci-jwt-secret-with-enough-length-for-validation
          HOOK_PROVIDER_KEY_SECRET=ci-provider-key-secret-with-enough-length
          EOF
          docker compose --env-file .env.ci config >/dev/null
          docker compose --env-file .env.ci -f docker-compose.prebuilt.yml config >/dev/null

      - name: Build Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          load: true
          push: false
          tags: ghcr.io/zzispp/hook:ci
          cache-from: type=gha,scope=ci-smoke
          cache-to: type=gha,mode=max,scope=ci-smoke

      - name: Smoke test Docker Compose deployment
        run: bash scripts/ci-docker-smoke.sh
