services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-hook}
      POSTGRES_USER: ${POSTGRES_USER:-hook}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Run ./scripts/create-docker-env.sh first}
    volumes:
      - hook-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-hook} -d ${POSTGRES_DB:-hook}"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - hook-redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20

  hook:
    image: ghcr.io/zzispp/hook:${HOOK_IMAGE_TAG:-latest}
    pull_policy: always
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      HOOK_CONFIG_PATH: /app/config.yaml
      HOOK_SERVER_HOST: 0.0.0.0
      HOOK_SERVER_PORT: 5555
      HOOK_DATABASE_URL: postgres://${POSTGRES_USER:-hook}:${POSTGRES_PASSWORD:?Run ./scripts/create-docker-env.sh first}@postgres:5432/${POSTGRES_DB:-hook}
      HOOK_REDIS_URL: redis://redis:6379?protocol=resp3
      HOOK_JWT_SECRET: ${HOOK_JWT_SECRET:?Run ./scripts/create-docker-env.sh first}
      HOOK_PROVIDER_KEY_SECRET: ${HOOK_PROVIDER_KEY_SECRET:?Run ./scripts/create-docker-env.sh first}
      HOOK_ADMIN_USERNAME: ${HOOK_ADMIN_USERNAME:?Run ./scripts/create-docker-env.sh first}
      HOOK_ADMIN_EMAIL: ${HOOK_ADMIN_EMAIL:?Run ./scripts/create-docker-env.sh first}
      HOOK_ADMIN_PASSWORD_B64: ${HOOK_ADMIN_PASSWORD_B64:?Run ./scripts/create-docker-env.sh first}
      HOOK_LOG_LEVEL: ${HOOK_LOG_LEVEL:-info}
    ports:
      - "${HOOK_PORT:-5555}:5555"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:5555/health"]
      interval: 10s
      timeout: 5s
      retries: 12

volumes:
  hook-postgres:
    name: hook-postgres
  hook-redis:
    name: hook-redis
