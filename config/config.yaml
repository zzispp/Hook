server:
  host: "127.0.0.1"
  port: 5555

database:
  url:
  scheme: "postgres"
  host: "localhost"
  port: 5433
  username: "postgres"
  password: "123456"
  name: "postgres"

jwt:
  secret: "hook-local-development-jwt-secret-change-before-deploy"
  access_token_ttl_seconds: 86400
  refresh_token_ttl_seconds: 604800

admin:
  id: "00000000-0000-7000-8000-000000000000"
  username: "admin"
  email: "admin@example.com"
  role: "admin"
  is_active: true
  password_hash: "$2b$12$xQS0SfLk9OmaG69aSxN7L.hBqkBJ7i/Vty7ZVLG/nKd8nb0HV0Kaa"
  wallet:
    id: "00000000-0000-7000-8000-000000000001"
    status: "active"
    limit_mode: "unlimited"

auth:
  whitelist:
    - methods: ["GET"]
      path_pattern: "/health"
    - methods: ["GET"]
      path_pattern: "/api/i18n/resources"
    - methods: ["POST"]
      path_pattern: "/api/auth/sign-in"
    - methods: ["POST"]
      path_pattern: "/api/auth/sign-up"
    - methods: ["POST"]
      path_pattern: "/api/auth/refresh"
    - methods: ["GET"]
      path_pattern: "/api/captcha/config"
    - methods: ["POST"]
      path_pattern: "/api/captcha/challenge"
    - methods: ["POST"]
      path_pattern: "/api/captcha/redeem"
    - methods: ["GET", "POST"]
      path_pattern: "/v1/*"
    - methods: ["POST"]
      path_pattern: "/v1beta/*"
  authenticated:
    - methods: ["GET"]
      path_pattern: "/api/auth/me"
    - methods: ["GET"]
      path_pattern: "/api/navbar"
    - methods: ["GET"]
      path_pattern: "/api/settings/display-currency"
    - methods: ["GET"]
      path_pattern: "/api/notifications"
    - methods: ["PATCH"]
      path_pattern: "/api/notifications/read-all"
    - methods: ["PATCH"]
      path_pattern: "/api/notifications/{source_type}/{source_id}/read"
    - methods: ["DELETE"]
      path_pattern: "/api/notifications/{source_type}/{source_id}"

security:
  provider_key_secret: "hook-local-development-provider-key-secret-change-before-deploy"

redis:
  url: "redis://default:@localhost:6380?protocol=resp3"
  scheme: "redis"
  host: "localhost"
  port: 6380
  username: "default"
  password: ""
  database:
  protocol: "resp3"
  key_prefix: "hook"

tracing:
  log_level: "info"
