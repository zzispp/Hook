[workspace]
members = [
    "apps/hook_backend",
    "crates/config",
    "crates/constants",
    "crates/model",
    "crates/rbac",
    "crates/storage",
    "crates/types",
    "crates/user",
]
resolver = "3"

[workspace.package]
version = "0.1.0"
edition = "2024"

[workspace.dependencies]
argon2 = "0.5.3"
async-trait = "0.1.89"
axum = "0.8.9"
config_rs = { package = "config", version = "0.15.22", default-features = false, features = ["yaml"] }
configuration = { path = "crates/config" }
constants = { path = "crates/constants" }
jsonwebtoken = "9.3.1"
matchit = "0.8.4"
rand_core = { version = "0.6.4", features = ["getrandom"] }
rbac = { path = "crates/rbac" }
redis = { version = "1.2.1", default-features = false, features = ["tokio-comp", "connection-manager"] }
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.145"
storage = { path = "crates/storage" }
thiserror = "2.0.17"
tokio = { version = "1.48.0", features = ["macros", "net", "rt-multi-thread"] }
tokio-postgres = "0.7.17"
toasty = { version = "=0.4.0", features = ["postgresql", "jiff", "serde", "rust_decimal"] }
toasty-cli = "=0.4.0"
tower = "0.5.2"
tower-http = { version = "0.6.6", features = ["cors"] }
tracing = "0.1.41"
tracing-subscriber = "0.3.20"
types = { path = "crates/types" }
user = { path = "crates/user" }
uuid = { version = "1.23.1", features = ["v7", "fast-rng"] }
jiff = "0.2.23"
model = { path = "crates/model" }
reqwest = { version = "0.12.24", default-features = false, features = ["json", "rustls-tls"] }
rust_decimal = { version = "1.41.0", features = ["serde-with-float"] }
