[workspace]
members = [
    "apps/hook_backend",
    "crates/config",
    "crates/constants",
    "crates/storage",
    "crates/types",
    "crates/user",
]
resolver = "3"

[workspace.package]
version = "0.1.0"
edition = "2024"

[workspace.dependencies]
argon2 = "0.5.3"
async-trait = "0.1.89"
axum = "0.8.9"
config_rs = { package = "config", version = "0.15.22", default-features = false, features = ["yaml"] }
configuration = { path = "crates/config" }
constants = { path = "crates/constants" }
jsonwebtoken = "9.3.1"
rand_core = { version = "0.6.4", features = ["getrandom"] }
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.145"
storage = { path = "crates/storage" }
thiserror = "2.0.17"
tokio = { version = "1.48.0", features = ["macros", "net", "rt-multi-thread"] }
toasty = { version = "=0.4.0", features = ["postgresql"] }
tower = "0.5.2"
tracing = "0.1.41"
tracing-subscriber = "0.3.20"
types = { path = "crates/types" }
user = { path = "crates/user" }
